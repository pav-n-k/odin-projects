<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/svg/bar.svg">
    <title>odin-bar</title>
</head>

<body>
<div id="app">
    <header class="header">
        <div class="container">
            <h1 class="logo"><img class="icon" src="assets/svg/bar.svg" alt="logo">odin-bar</h1>
            <nav>
                <ul class="navigation">
                    <li><a id="home-link" class="link" href="http://">home</a></li>
                    <li><a id="menu-link" class="link" href="http://">menu</a></li>
                    <li><a id="find-us-link" class="link" href="http://">find-us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="main">
        <div class="container" id="content">
            <section class="row">
                <div class="cards">
                    <figure class="card">
                        <img src="assets/images/lavande.jpg" alt="lavande">
                        <figcaption>
                            A delicate and floral aperitif with notes of lavender and chamomile.
                        </figcaption>
                    </figure>
                    <figure class="card">
                        <img src="assets/images/primavera.jpg" alt="primavera">
                        <figcaption>
                            A refreshing and vibrant aperitif with bright citrus notes.
                        </figcaption>
                    </figure>
                    <figure class="card">
                        <img src="assets/images/spezia.jpg" alt="spezia">
                        <figcaption>
                            A bold, spiced aperitif featuring cardamom, ginger, and cinnamon.
                        </figcaption>
                    </figure>
                </div>
            </section>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <p>Copyright &copy; The Odin Project <span id="current-year"></span></p>
            <span>Created by</span>
            <a class="github-link" href="https://github.com/pav-n-k" target="_blank">pav-n-k</a>
        </div>
    </footer>
</div>
</body>

</html>
