name: Build/Deploy project to gh-pages

on:
  push:
    branches-ignore:
      - main
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          PROJECT="${GITHUB_REF_NAME}"
          if [ -f "$PROJECT/package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
            echo "publish_dir=$PROJECT/dist" >> $GITHUB_OUTPUT
          else
            echo "type=static" >> $GITHUB_OUTPUT
            echo "publish_dir=$PROJECT" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.type == 'node'
        run: npm ci
        working-directory: ${{ github.ref_name }}

      - name: Build
        if: steps.detect.outputs.type == 'node'
        run: npm run build
        working-directory: ${{ github.ref_name }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ steps.detect.outputs.publish_dir }}
          destination_dir: ${{ github.ref_name }}
          keep_files: true