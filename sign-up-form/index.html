<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>sign-up-form</title>
</head>

<body>
<div class="app" id="app">
    <div class="container">
        <section class="visual-side">
            <img class="logo" src="src/assets/odin-lined.png" alt="odin logo">
            <h1 class="title">sign up form</h1>
            <p class="description">created by<a class="github-link" href="https://github.com/pav-n-k" target="_blank"
                                                rel="noopener noreferrer">pavel nikonorov</a></p>
            <div class="social">
                <a class="tg-link" href="https://t.me/pav_n_k" target="_blank" rel="noopener noreferrer"></a>
            </div>
        </section>
        <section class="main">
            <header class="header">
                <h2 class="sub-title">create an account</h2>
                <p>sign up now to get started with an account</p>
                <button class="btn" type="button">sign up with google</button>
            </header>
            <form class="form" id="sign-up-form" action="" method="">
                <label class="label">
                    *first name:
                    <input class="input" type="text" name="first-name" id="first-name" minlength="3" maxlength="50"
                           placeholder="Elon" required autofocus>
                </label>
                <label class="label">
                    *last name:
                    <input class="input" type="text" name="last-name" id="last-name" minlength="3" maxlength="50"
                           placeholder="Musk" required>
                </label>
                <label class="label">
                    *email:
                    <input class="input" type="email" name="email" id="email" placeholder="elon@musk.com" required>
                </label>
                <label class="label">
                    age:
                    <input class="input" type="number" name="age" required min="5" max="100">
                </label>
                <label class="label">
                    *password:
                    <input class="input" id="password" type="password" name="password" minlength="8" maxlength="50"
                           required>
                </label>
                <label class="label">
                    *confirm password:
                    <input class="input" id="confirm-password" type="password" name="confirm-password" minlength="8"
                           maxlength="50" required>
                    <span id="message">Must be at least 8 characters</span>
                </label>
                <label class="label label--accept">
                    I have read and agree to the <a href="http://" target="_blank" rel="noopener noreferrer">terms of
                    service</a>
                    <input type="checkbox" id="news-letter" name="news-letter">
                </label>
                <button class="btn" type="submit">get started</button>
            </form>
            <footer class="footer">
                <p>already have an account? <a href="http://" target="_blank" rel="noopener noreferrer">log in</a></p>
            </footer>
        </section>
    </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
