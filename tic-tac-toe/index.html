<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/odin-projects/tic-tac-toe/vite.svg" />
        <link rel="stylesheet" href="/odin-projects/tic-tac-toe/modern-normalize.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tic-tac-toe</title>
      <script type="module" crossorigin src="/odin-projects/tic-tac-toe/assets/index-Cue4l9aU.js"></script>
      <link rel="stylesheet" crossorigin href="/odin-projects/tic-tac-toe/assets/index-BUsKvvOR.css">
    </head>
    <body>
        <div id="app">
            <div class="container">
                <h1 class="title">Tic-Tac-Toe</h1>
                <p>Tic-Tac-Toe is a classic two-player browser game on a 3x3 grid where players alternate placing "X" or "O" to get three in a row.</p>
                <p></p>
                <output id="game-result" aria-live="polite">Set player [?] token into x: ... and y: ...</output>
                <output id="player-turn" aria-live="polite">[?]</output>
                <p id="results">
                    <span id="player-x-result"></span>
                    <span id="player-o-result"></span>
                    <span id="draw"></span>
                </p>
                <div class="grid" id="grid"></div>
                <button class="button" id="reset-btn">Reset game</button>
                <span class="description">Copyright © <span id="current-year"></span><a class="link" href="https://github.com/pav-n-k">pav-n-k</a></span>
            </div>
        </div>
        
    </body>
</html>
